<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Page Scroll Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#section1">Section 1</a></li>
                <li><a href="#section2">Section 2</a></li>
                <li><a href="#section3">Section 3</a></li>
            </ul>
        </nav>
    </header>

    <div id="section1" class="section">
        <h2>Section 1</h2>
        <p>This is Section 1. Scroll down to see more.</p>
    </div>

    <div id="section2" class="section">
        <h2>Section 2</h2>
        <p>This is Section 2. Scroll down to see more.</p>
    </div>

    <div id="section3" class="section">
        <h2>Section 3</h2>
        <p>This is Section 3. You have reached the end!</p>
    </div>

    <footer>
        <p>© 2026 Single Page Scroll Example</p>
    </footer>
</body>
</html>
