<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous Scroll with Parallax</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Continuous Scroll Example</h1>
    </header>

    <div class="content">
        <div class="item" style="background-color: #FF6347;">Item 1</div>
        <div class="item" style="background-color: #FF8C00;">Item 2</div>
        <div class="item" style="background-color: #FFD700;">Item 3</div>
        <div class="item" style="background-color: #ADFF2F;">Item 4</div>
        <div class="item" style="background-color: #32CD32;">Item 5</div>
        <div class="item" style="background-color: #4682B4;">Item 6</div>
    </div>

    <!-- Parallax Section -->
    <div class="parallax">
        <div class="parallax-content">
            <h2>Parallax Effect</h2>
            <p>This section has a parallax effect on its background.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
